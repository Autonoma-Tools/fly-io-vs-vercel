# fly.pr.toml — Fly.io config overlay for PR preview environments.
#
# Drop this file alongside your main fly.toml. The GitHub Actions workflow
# references it via `flyctl deploy --config fly.pr.toml`.
#
# Preview environments use smaller machines than production and auto-sleep
# when idle so you only pay for active test time.

# Replace `myapp` with your base app name. The workflow overrides `app` at
# deploy time via `--app pr-<PR_NUMBER>-myapp`, so this value is a default
# for local `flyctl deploy --config fly.pr.toml` invocations.
app = "myapp-preview"
primary_region = "iad"

[build]
  # Reuse your production Dockerfile unless you have a preview-specific one.
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "preview"
  LOG_LEVEL = "info"

[http_service]
  internal_port = 3000
  force_https = true
  # Let preview machines sleep when idle — only charge for active test time.
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 150

[[vm]]
  # Preview machines are intentionally small. Scale up via fly.toml for prod.
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
  size = "shared-cpu-1x"

[[services.tcp_checks]]
  grace_period = "10s"
  interval = "15s"
  restart_limit = 0
  timeout = "2s"
